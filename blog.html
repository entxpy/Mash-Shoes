  <style>
  .grid-container {
      display: grid;
      grid-template-columns: repeat(3,220px);
      grid-template-rows: repeat(3, 150px);
      gap: 10px;
      background: lightgoldenrodyellow ;
        padding: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);/* shadow effect */
    }
    .item{
        display: flex;
        align-items: center;
        justify-content: center;    
        font-weight: bold;
    }
    .item img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;/* rounded corners */
    }
    .item1{
        grid-column: 1/2;
        grid-row: 1/2;
    }
    .item2{
        grid-column: 2/4;
        grid-row: 1/2;
    }
    .item3{
        grid-column: 1/3;
        grid-row: 2/3;
    }
    .item4{
        grid-column: 3/4;
        grid-row: 2/4;
    }
    .item5{
        grid-column: 1/2;
        grid-row: 3/4;
    }
    .item6{
        grid-column: 2/3;
        grid-row: 3/4;
    }
    .row {
  display: flex;
    padding: 10px;
    justify-content: space-between; /* Space between columns */
    flex-wrap: wrap;
}
/* Create two equal columns that sits next to each other */
.column {
  flex: 1;
  padding: 10px;
  height: 600px;
  color:black;
  background-color: white;
  gap: 10px;
}    
    footer {
      background-color: white;
      color: black;
      text-align: center;
      padding: 15px;
      font-family: Arial, sans-serif;
    }

    footer a:visited {
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }
   
  </style>
</head>
