<!DOCTYPE html>

  <title>Products</title>
  <style>
    body {
      font-family:sans-serif;
      justify-content: center;
      background:lightgoldenrodyellow;
      color: BLACK;
      align-items: center;
      height: 100vh;
      display: flex;
    }
    .main-content {
      flex: 1;
    }
    header {
      height: 150px; /* increase height */
      background-color: lightgoldenrodyellow;
      color: black;
      display: flex;
      text-align: center;
      padding-top: 50px; /* optional, for spacing text inside */
    }
    .navbar{
     background-color: wheat;
     overflow: hidden;
     display: flex;
     justify-content: left;
     padding: 5px 0;
 }
 .navbar a{
  float: left;
  color: black;
  padding: 14px 20px;
  text-decoration:underline;
  text-transform: uppercase;
  font-weight: bold;
  transition: cubic-bezier(0.165, 0.84, 0.44, 1);
 }
 .navbar a:hover{
  background-color: #fff;
  color: #111;
  border-radius: 5px;
 }
 .navbar a:visited{
  color:black;
  text-decoration: none;
  font-weight: bold;
 }
 .search-container{
      margin-left: auto;
      display: flex;
      align-items: center;
    }
 .search-container input[type="text"]{
      padding: 8px;
      border-radius: 4px;
      border: none;
      background-color: white;
      color: black;
    }
    .search-container .search-button{
      padding: 8px 12px;
      background-color:black ;
      color: white;
      border: none;
      border-radius: 4px;
      cursor:pointer;
      font-weight: bold;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3,140px);
      grid-template-rows: repeat(3, 130px);
      gap: 10px;
      background:  lightgoldenrodyellow;
        padding: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);/* shadow effect */
    }
    .item{
        display: flex;
        align-items: center;
        justify-content: center;    
        font-weight: bold;
    }
    .item img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;/* rounded corners */
    }
    .item1{
        grid-column: 1/2;
        grid-row: 1/2;
    }
    .item2{
        grid-column: 2/4;
        grid-row: 1/2;
    }
    .item3{
        grid-column: 1/3;
        grid-row: 2/3;
    }
    .item4{
        grid-column: 3/4;
        grid-row: 2/4;
    }
    .item5{
        grid-column: 1/2;
        grid-row: 3/4;
    }
    .item6{
        grid-column: 2/3;
        grid-row: 3/4;
    }
    .row {
  display: flex;
    padding: 10px;
    justify-content: space-between; /* Space between columns */
    flex-wrap: wrap;
}
/* Create two equal columns that sits next to each other */
.column {
  flex: 1;
  padding: 10px;
  height: 450px;
  color:black;
  background-color: lightgoldenrodyellow;
  gap: 10px;
}  
.link{
    transition: 0.3s ease;
}
.link:hover{
    transform:scale(1.1);/*zoom effect*/
}
footer {
      background: #1e1e1e;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #ccc;
    }

    footer a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
